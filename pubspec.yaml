name: booking_app
description: "تطبيق حجوزات الفنادق والسفر - Hotel & Travel Booking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # API & Networking
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # JSON & Data
  json_annotation: ^4.8.1
  
  # Internationalization
  intl: ^0.20.2
  
  # Utilities
  uuid: ^4.2.1
  intl_phone_field: ^3.2.0
  
  # Images from Internet
  cached_network_image: ^3.3.1
  
  # Animations
  animations: ^2.0.11
  shimmer: ^3.0.0
  lottie: ^3.1.2
  
  # UI Enhancements
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  smooth_page_indicator: ^1.1.0
  url_launcher: ^6.3.2
  flutter_stripe: ^10.1.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1
 # Icons App
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  remove_alpha_ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # Assets
  assets:
    - assets/images/

  # Localization
  generate: true
